<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Facturas a TXT</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { margin: 0; font-size: 28px; }
        .header p { margin: 10px 0 0; opacity: 0.9; }
        .content { padding: 30px; }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-area:hover { border-color: #764ba2; background: #f0f2ff; }
        .file-info {
            background: #e3f2fd;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            display: none;
        }
        .file-info.show { display: block; }
        .stats {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            flex: 1;
            min-width: 150px;
            text-align: center;
        }
        .stat-card .number { font-size: 32px; font-weight: bold; }
        .stat-card .label { font-size: 12px; opacity: 0.9; }
        .preview-area { margin-top: 30px; }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .preview-header h3 { margin: 0; color: #333; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { background: #218838; }
        .btn-secondary { background: #6c757d; color: white; }
        .preview {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 10px;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            overflow-x: auto;
            max-height: 400px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .alert { padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-warning { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .hidden { display: none; }
        footer { text-align: center; padding: 20px; color: rgba(255,255,255,0.7); font-size: 12px; }
        @media (max-width: 768px) { .content { padding: 20px; } .stats { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>📄 Conversor de Facturas a TXT</h1>
                <p>Transforma tu archivo Excel/CSV al formato requerido</p>
            </div>
            <div class="content">
                <div id="uploadArea" class="upload-area">
                    <div style="font-size:60px; margin-bottom:20px;">📁</div>
                    <h3>Arrastra o selecciona tu archivo</h3>
                    <p style="color:#666; margin-top:10px;">Formatos: .xlsx, .xls, .csv</p>
                    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none;">
                    <button class="btn btn-primary" id="selectFileBtn" style="margin-top:20px;">📂 Seleccionar archivo</button>
                </div>
                <div id="fileInfo" class="file-info">
                    <div id="statsContainer" class="stats"></div>
                </div>
                <div id="alertContainer"></div>
                <div id="previewArea" class="preview-area hidden">
                    <div class="preview-header">
                        <h3>📋 Vista previa del TXT</h3>
                        <div>
                            <button id="copyBtn" class="btn btn-secondary">📋 Copiar</button>
                            <button id="downloadBtn" class="btn btn-success">💾 Descargar TXT</button>
                            <button id="resetBtn" class="btn btn-secondary">🔄 Limpiar</button>
                        </div>
                    </div>
                    <div id="preview" class="preview"></div>
                </div>
            </div>
        </div>
        <footer>Procesamiento local en tu navegador - Sin envío de datos</footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script>
        const REQUIRED_COLUMNS = [
            'FECHA', 'COD_OPER', 'LETRA', 'TIPO', 'NUMERO_FAC', 'RVA',
            'MONEDA', 'MONTO', 'IVATASA1', 'IVATASA2', 'PLANNING',
            'CENTROCOSTO', 'CUENTA', 'DESCRIP', 'IVA_GAS_105', 'IVATASA27',
            'RETENIB', 'RETENGAN', 'RETENIVA', 'PERCEP_IB', 'PERCEP_GANAN',
            'PERCEP_IVA', 'PERCEP_INT', 'NO_GRAVADO', 'EXENTO'
        ];

        let currentData = null;

        function showAlert(msg, type = 'success') {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = msg;
            alertContainer.appendChild(alert);
            setTimeout(() => alert.remove(), 5000);
        }

        function formatDate(val) {
            if (!val && val !== 0) return '';
            if (typeof val === 'number' && val > 40000) {
                const d = XLSX.SSF.parse_date_code(val);
                return `${String(d.d).padStart(2,'0')}/${String(d.m).padStart(2,'0')}/${d.y}`;
            }
            let s = String(val).trim().replace(/[-\.]/g, '/');
            const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
            if (m) return `${m[1].padStart(2,'0')}/${m[2].padStart(2,'0')}/${m[3]}`;
            return s;
        }

        function cleanNum(val) {
            if (val === null || val === undefined || val === '') return 0;
            if (typeof val === 'number') return val;
            let s = String(val).replace(',', '.').replace(/[^\d.-]/g, '');
            const n = parseFloat(s);
            return isNaN(n) ? 0 : n;
        }

        function findCol(headers, names) {
            for (let i = 0; i < headers.length; i++) {
                const h = String(headers[i] || '').trim().toLowerCase();
                for (const n of names) {
                    if (h === n.toLowerCase()) return i;
                }
            }
            return -1;
        }

        function transformData(jsonData) {
            if (!jsonData || jsonData.length < 2) return [];
            
            // Buscar fila de headers
            let hIdx = 0;
            for (let i = 0; i < Math.min(15, jsonData.length); i++) {
                const r = jsonData[i];
                if (r && r.some(c => String(c||'').toLowerCase().includes('fecha'))) {
                    hIdx = i;
                    break;
                }
            }
            
            const headers = jsonData[hIdx].map(h => String(h||'').trim());
            const rows = jsonData.slice(hIdx + 1).filter(r => 
                r && r.some(c => c !== null && c !== undefined && c !== '' && c !== 0)
            );
            
            // Mapeo de columnas
            const ci = {
                fecha: findCol(headers, ['Fecha', 'FECHA']),
                tipo: findCol(headers, ['Tipo', 'TIPO']),
                pv: findCol(headers, ['Punto de Venta']),
                num: findCol(headers, ['Número Desde']),
                moneda: findCol(headers, ['Moneda']),
                total: findCol(headers, ['Imp. Total', 'MONTO']),
                iva21: findCol(headers, ['IVA 21%']),
                iva10_5: findCol(headers, ['IVA 10,5%', 'IVA 10.5%']),
                iva2_5: findCol(headers, ['IVA 2,5%', 'IVA 2.5%']),
                iva27: findCol(headers, ['IVA 27%']),
                noGrav: findCol(headers, ['Neto No Gravado']),
                exento: findCol(headers, ['Op. Exentas']),
                denom: findCol(headers, ['Denominación Emisor', 'DESCRIP'])
            };
            
            return rows.map(row => {
                const tipo = row[ci.tipo] ? String(row[ci.tipo]) : '';
                let codOper = 1, letra = 'A', tipoDoc = 'FAC';
                
                if (tipo.match(/^(\d+)/)) codOper = parseInt(tipo.match(/^(\d+)/)[1]);
                if (tipo.includes('Factura A')) letra = 'A';
                else if (tipo.includes('Factura B')) letra = 'B';
                else if (tipo.includes('Factura C')) letra = 'C';
                if (tipo.includes('Nota de Crédito')) tipoDoc = 'NC';
                
                const pv = row[ci.pv] ? String(row[ci.pv]).padStart(4, '0') : '';
                const num = row[ci.num] ? String(row[ci.num]).padStart(8, '0') : '';
                
                return {
                    FECHA: ci.fecha >= 0 ? formatDate(row[ci.fecha]) : '',
                    COD_OPER: codOper,
                    LETRA: letra,
                    TIPO: tipoDoc,
                    NUMERO_FAC: (pv && num && pv !== '0000') ? `${pv}-${num}` : '',
                    RVA: 0,
                    MONEDA: ci.moneda >= 0 ? (row[ci.moneda] || 'ARS') : 'ARS',
                    MONTO: ci.total >= 0 ? cleanNum(row[ci.total]) : 0,
                    IVATASA1: ci.iva21 >= 0 ? cleanNum(row[ci.iva21]) : 0,
                    IVATASA2: ci.iva10_5 >= 0 ? cleanNum(row[ci.iva10_5]) : 0,
                    PLANNING: 0,
                    CENTROCOSTO: 0,
                    CUENTA: 0,
                    DESCRIP: ci.denom >= 0 ? (row[ci.denom] || '') : '',
                    IVA_GAS_105: ci.iva2_5 >= 0 ? cleanNum(row[ci.iva2_5]) : 0,
                    IVATASA27: ci.iva27 >= 0 ? cleanNum(row[ci.iva27]) : 0,
                    RETENIB: 0,
                    RETENGAN: 0,
                    RETENIVA: 0,
                    PERCEP_IB: 0,
                    PERCEP_GANAN: 0,
                    PERCEP_IVA: 0,
                    PERCEP_INT: 0,
                    NO_GRAVADO: ci.noGrav >= 0 ? cleanNum(row[ci.noGrav]) : 0,
                    EXENTO: ci.exento >= 0 ? cleanNum(row[ci.exento]) : 0
                };
            });
        }

        function generateTXT(data) {
            const lines = [REQUIRED_COLUMNS.join(';') + ';'];
            data.forEach(row => {
                lines.push(REQUIRED_COLUMNS.map(col => row[col] ?? '').join(';') + ';');
            });
            return lines.join('\n');
        }

        function updateStats(data) {
            const total = data.length;
            const monto = data.reduce((s, r) => s + (parseFloat(r.MONTO) || 0), 0);
            const iva1 = data.reduce((s, r) => s + (parseFloat(r.IVATASA1) || 0), 0);
            const iva27 = data.reduce((s, r) => s + (parseFloat(r.IVATASA27) || 0), 0);
            
            statsContainer.innerHTML = `
                <div class="stat-card">
                    <div class="number">${total}</div>
                    <div class="label">Facturas</div>
                </div>
                <div class="stat-card">
                    <div class="number">$${monto.toLocaleString('es-AR', {minimumFractionDigits: 2})}</div>
                    <div class="label">Total</div>
                </div>
                <div class="stat-card">
                    <div class="number">$${iva1.toLocaleString('es-AR', {minimumFractionDigits: 2})}</div>
                    <div class="label">IVA 21%</div>
                </div>
            `;
        }

        function processFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(ws, {header: 1, defval: ''});
                    
                    const data = transformData(json);
                    if (data.length === 0) {
                        showAlert('No se encontraron datos válidos', 'error');
                        return;
                    }
                    
                    const txt = generateTXT(data);
                    currentData = {txt, data, name: file.name.replace(/\.[^/.]+$/, '')};
                    
                    preview.textContent = txt.split('\n').slice(0, 20).join('\n') + 
                        `\n\n... ${data.length} registros totales`;
                    previewArea.classList.remove('hidden');
                    updateStats(data);
                    fileInfo.classList.add('show');
                    showAlert(`✅ ${data.length} facturas procesadas`, 'success');
                } catch (err) {
                    showAlert('Error: ' + err.message, 'error');
                }
            };
            reader.readAsArrayBuffer(file);
        }

        uploadArea.addEventListener('dragover', (e) => { 
            e.preventDefault(); 
            uploadArea.style.borderColor = '#28a745'; 
        });
        uploadArea.addEventListener('dragleave', () => { 
            uploadArea.style.borderColor = '#667eea'; 
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#667eea';
            processFile(e.dataTransfer.files[0]);
        });
        
        selectFileBtn.onclick = () => fileInput.click();
        fileInput.onchange = (e) => processFile(e.target.files[0]);
        
        copyBtn.onclick = () => {
            if (!currentData) return;
            navigator.clipboard.writeText(currentData.txt)
                .then(() => showAlert('✅ Copiado al portapapeles'))
                .catch(() => showAlert('Error al copiar', 'error'));
        };
        
        downloadBtn.onclick = () => {
            if (!currentData) return;
            const blob = new Blob([currentData.txt], {type: 'text/plain;charset=utf-8'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${currentData.name}_CONVERTIDO.txt`;
            a.click();
            showAlert('✅ Archivo descargado');
        };
        
        resetBtn.onclick = () => {
            currentData = null;
            fileInfo.classList.remove('show');
            previewArea.classList.add('hidden');
            fileInput.value = '';
            showAlert('Todo limpio', 'success');
        };
    </script>
</body>
</html>
